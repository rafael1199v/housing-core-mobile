name: housing_core
description: "Shared framework-agnostic plumbing (session, network, storage, roles, errors, config) for the Itersapiens apps."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # Networking (shared Dio + refresh-on-401 interceptor)
  dio: ^5.7.0

  # Secure token storage
  flutter_secure_storage: ^9.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
